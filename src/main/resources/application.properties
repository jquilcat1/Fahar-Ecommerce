spring.application.name=streetwear
# 1. Credenciales de la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/fahar_bd?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL en la consola para facilitar el debuggeo del equipo
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. Configuración de Thymeleaf
# Desactiva la caché para que los cambios en HTML/CSS se vean al recargar la página
spring.thymeleaf.cache=false

server.port=9090