<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle de Producto | FAHAR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link rel="stylesheet" th:href="@{/assets/css/estilos.css}" />
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">
    
    <div th:replace="~{fragments/header :: navbar-carrito}"></div>

    <main class="container my-5 flex-grow-1">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item">
            <a th:href="@{/}" class="text-dark text-decoration-none">Inicio</a>
          </li>
          <li class="breadcrumb-item">
            <a th:href="@{/catalogo}" class="text-dark text-decoration-none">Tienda</a>
          </li>
          <li class="breadcrumb-item text-muted" th:text="${producto.nombreMarca}">
            Marca
          </li>
          <li
            class="breadcrumb-item active"
            aria-current="page"
            th:text="${producto != null ? producto.nombre : 'Hoodie Caravaggio'}"
          >
            Hoodie Caravaggio
          </li>
        </ol>
      </nav>

      <div class="row g-5 mt-2">
        <div class="col-md-6">
          <img
            id="mainImage"
            th:src="${producto != null and producto.imagenUrl != null ? producto.imagenUrl : '/assets/img/Off-White1.jpg'}"
            class="img-fluid rounded shadow-sm w-100 mb-3"
            style="object-fit: cover; aspect-ratio: 1/1"
            alt="Producto"
          />


          <div class="row g-2" th:if="${producto != null}">
            <div class="col-3" th:if="${producto.imagenUrl != null}">
              <img
                th:src="${producto.imagenUrl}"
                class="img-fluid rounded border thumbnail-img"
                style="cursor: pointer; object-fit: cover; aspect-ratio: 1/1; opacity: 1; transition: 0.3s;"
                onclick="changeImage(this)"
                alt="Foto 1"
              />
            </div>

            <div class="col-3" th:if="${producto.imagenUrl2 != null}">
              <img
                th:src="${producto.imagenUrl2}"
                class="img-fluid rounded border thumbnail-img"
                style="cursor: pointer; object-fit: cover; aspect-ratio: 1/1; opacity: 0.5; transition: 0.3s;"
                onclick="changeImage(this)"
                alt="Foto 2"
              />
            </div>

            <div class="col-3" th:if="${producto.imagenUrl3 != null}">
              <img
                th:src="${producto.imagenUrl3}"
                class="img-fluid rounded border thumbnail-img"
                style="cursor: pointer; object-fit: cover; aspect-ratio: 1/1; opacity: 0.5; transition: 0.3s;"
                onclick="changeImage(this)"
                alt="Foto 3"
              />
            </div>
  
            <div class="col-3" th:if="${producto.imagenUrl4 != null}">
              <img
                th:src="${producto.imagenUrl4}"
                class="img-fluid rounded border thumbnail-img"
                style="cursor: pointer; object-fit: cover; aspect-ratio: 1/1; opacity: 0.5; transition: 0.3s;"
                onclick="changeImage(this)"
                alt="Foto 4"
              />
            </div>
          </div>
        </div>

        <div class="col-md-6">
          <p
            class="text-muted text-uppercase fw-bold mb-1"
            th:text="${producto != null ? producto.nombreMarca : 'Off-White'}"
          >
            Off-White
          </p>

          <h1
            class="fw-bold mb-3"
            th:text="${producto != null ? producto.nombre : 'Nombre del Producto'}"
          ></h1>

          <h2
            class="fw-bold mb-4"
            th:text="${producto != null ? 'S/ ' + producto.precio : 'S/ 0.00'}"
          ></h2>

          <p
            class="text-secondary mb-4"
            th:text="${producto != null ? producto.descripcion : 'Descripción no disponible.'}"
          ></p>

          <div sec:authorize="!hasRole('ADMIN')">
             <form class="mb-4" th:action="@{/carrito/agregar}" method="post">
            <input
              type="hidden"
              name="productoId"
              th:value="${producto != null ? producto.id : ''}"
            />

            <div
              class="mb-3"
              th:if="${#lists.contains({'Hoodies', 'T-Shirts', 'Chaquetas'}, producto.nombreCategoria)}"
            >
              <label class="form-label fw-bold">Talla</label>
              <select class="form-select w-50" name="talla" required>
                <option selected disabled value="">Seleccionar talla...</option>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
              </select>
            </div>
            <div class="mb-3" th:if="${#lists.contains({'Pantalones', 'Shorts'}, producto.nombreCategoria)}">
              <label class="form-label fw-bold">Talla</label>
              <select class="form-select w-50" name="talla" required>
                <option selected disabled value="">Seleccionar talla...</option>
                <option value="28">28</option>
                <option value="30">30</option>
                <option value="32">32</option>
                <option value="34">34</option>
                <option value="36">36</option>
              </select>
            </div>
            <div class="mb-3" th:if="${producto.nombreCategoria == 'Sneakers'}">
              <label class="form-label fw-bold">Talla</label>
              <select class="form-select w-50" name="talla" required>
                <option selected disabled value="">Seleccionar talla...</option>
                <option value="38">38</option>
                <option value="39">39</option>
                <option value="40">40</option>
                <option value="41">41</option>
                <option value="42">42</option>
                <option value="43">43</option>
                <option value="44">44</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold">Cantidad</label>
              <input
                type="number"
                class="form-control w-25"
                name="cantidad"
                value="1"
                min="1"
              />
            </div>

            <button type="submit" class="btn btn-dark btn-lg w-100 mb-2">
              Añadir al Carrito
            </button>
            <a
              th:href="@{/carrito/checkout}"
              class="btn btn-outline-dark btn-lg w-100"
              >Comprar Ahora</a
            >
          </form>

          <hr />
          <p class="small text-muted">
            <i class="bi bi-box-seam me-2"></i>Envío gratis en Lima
            Metropolitana a partir de S/ 500.
          </p>
          <p class="small text-muted">
            <i class="bi bi-shield-check me-2"></i>Autenticidad garantizada.
          </p>
        </div>
        <div sec:authorize="hasRole('ADMIN')" class="alert alert-secondary text-center fw-bold border-0 rounded-0 mb-4 p-4">
            <i class="bi bi-shield-lock-fill fs-4 d-block mb-2"></i>
            Modo Administrador activado.<br>
            <span class="fw-normal text-muted small">Las funciones de compra están deshabilitadas para este rol.</span>
          </div>
      </div>
    </main>

    <div th:replace="~{fragments/footer :: footer-modales}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/assets/js/app.js}"></script>
    
    <script>
      function changeImage(element) {

        const mainImage = document.getElementById("mainImage");

        if (mainImage) {
          mainImage.src = element.src;
        }

        const thumbs = document.querySelectorAll(".thumbnail-img");
        thumbs.forEach((t) => (t.style.opacity = "0.5"));

        element.style.opacity = "1";
      }
    </script>
  </body>
</html>
