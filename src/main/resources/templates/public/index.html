<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAHAR | Streetwear & Ropa Urbana</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/assets/css/estilos.css}" />
  </head>

  <body class="bg-light">
    <div th:replace="~{fragments/header :: navbar-carrito}"></div>

    <main>
      <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              th:src="@{/assets/img/portada1.png}"
              class="d-block w-100"
              alt="Nuevos ingresos"
            />
            <div
              class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 p-3 rounded"
            >
              <h2 class="fw-bold">Nuevos Ingresos</h2>
              <p>Descubre lo último de Yeezy y Amiri.</p>
              <a
                th:href="@{/catalogo}"
                class="btn btn-light btn-pro rounded-pill px-4 py-2 mt-2 fw-bold text-dark"
              >
                Ver Catálogo
                <i class="bi bi-arrow-right ms-2 arrow-icon text-dark"></i>
              </a>
            </div>
          </div>
          <div class="carousel-item">
            <img
              th:src="@{/assets/img/portada2.png}"
              class="d-block w-100"
              alt="Marcas exclusivas"
            />
            <div
              class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 p-3 rounded"
            >
              <h2 class="fw-bold">Streetwear Auténtico</h2>
              <p>Trabajamos solo con distribuidores oficiales.</p>
            </div>
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#heroCarousel"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#heroCarousel"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>

      <div class="container my-5">
        <h3 class="fw-bold text-center mb-5 tracking-wide">
          COMPRA POR CATEGORÍA
        </h3>
        <div class="row g-4 text-center">
          <div class="col-md-4">
            <a
              th:href="@{/catalogo(categorias=2)}"
              class="text-decoration-none"
            >
              <div
                class="card bg-dark text-white border-0 card-hover shadow-lg"
              >
                <img
                  th:src="@{/assets/img/Hoddie.png}"
                  class="card-img"
                  alt="Hoodies"
                />
                <div
                  class="card-img-overlay d-flex align-items-center justify-content-center bg-dark bg-opacity-50"
                >
                  <h4 class="fw-bold tracking-wide text-white">HOODIES</h4>
                </div>
              </div>
            </a>
          </div>
          <div class="col-md-4">
            <a
              th:href="@{/catalogo(categorias=1)}"
              class="text-decoration-none"
            >
              <div
                class="card bg-dark text-white border-0 card-hover shadow-lg"
              >
                <img
                  th:src="@{/assets/img/Sneakers.jpg}"
                  class="card-img"
                  alt="Sneakers"
                />
                <div
                  class="card-img-overlay d-flex align-items-center justify-content-center bg-dark bg-opacity-50"
                >
                  <h4 class="fw-bold tracking-wide text-white">SNEAKERS</h4>
                </div>
              </div>
            </a>
          </div>
          <div class="col-md-4">
            <a
              th:href="@{/catalogo(categorias=5)}"
              class="text-decoration-none"
            >
              <div
                class="card bg-dark text-white border-0 card-hover shadow-lg"
              >
                <img
                  th:src="@{/assets/img/Accesorios.jpeg}"
                  class="card-img"
                  alt="Accesorios"
                />
                <div
                  class="card-img-overlay d-flex align-items-center justify-content-center bg-dark bg-opacity-50"
                >
                  <h4 class="fw-bold tracking-wide text-white">ACCESORIOS</h4>
                </div>
              </div>
            </a>
          </div>
        </div>
      </div>
    </main>

    <div th:replace="~{fragments/footer :: footer-modales}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/assets/js/app.js}"></script>
  </body>
</html>
