<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo | FAHAR Streetwear</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/assets/css/estilos.css}" />
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: navbar-carrito}"></div>

    <main class="container my-5 flex-grow-1">
      <form id="formFiltros" th:action="@{/catalogo}" method="GET"></form>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Toda la colección</h2>

        <select
          name="sort"
          form="formFiltros"
          class="form-select w-auto"
          onchange="document.getElementById('formFiltros').submit()"
        >
          <option value="3" th:selected="${sortSeleccionado == '3'}">
            Nuevos ingresos
          </option>
          <option value="1" th:selected="${sortSeleccionado == '1'}">
            Precio: Menor a Mayor
          </option>
          <option value="2" th:selected="${sortSeleccionado == '2'}">
            Precio: Mayor a Menor
          </option>
        </select>
      </div>

      <div class="row">
        <aside class="col-md-3 mb-4">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h5 class="fw-bold mb-3">Filtros</h5>
              <h6 class="fw-bold mt-4 mb-2">Categorías</h6>
              <div class="form-check" th:each="cat : ${listaCategorias}">
                <input
                  class="form-check-input"
                  type="checkbox"
                  name="categorias"
                  th:value="${cat.id}"
                  form="formFiltros"
                  th:id="'cat' + ${cat.id}"
                  th:checked="${categoriasSeleccionadas != null and #lists.contains(categoriasSeleccionadas, cat.id)}"
                />
                <label
                  class="form-check-label"
                  th:for="'cat' + ${cat.id}"
                  th:text="${cat.nombre}"
                ></label>
              </div>

              <h6 class="fw-bold mt-4 mb-2">Marcas</h6>

              <div
                th:each="marca, stat : ${listaMarcas}"
                th:if="${stat.index < 5}"
                class="form-check"
              >
                <input
                  class="form-check-input"
                  type="checkbox"
                  name="marcas"
                  th:value="${marca.id}"
                  form="formFiltros"
                  th:id="'marca' + ${marca.id}"
                  th:checked="${marcasSeleccionadas != null and #lists.contains(marcasSeleccionadas, marca.id)}"
                />
                <label
                  class="form-check-label"
                  th:for="'marca' + ${marca.id}"
                  th:text="${marca.nombre}"
                ></label>
              </div>

              <div
                class="collapse"
                id="collapseMarcas"
                th:if="${listaMarcas.size() > 5}"
              >
                <div
                  th:each="marca, stat : ${listaMarcas}"
                  th:if="${stat.index >= 5}"
                  class="form-check"
                >
                  <input
                    class="form-check-input"
                    type="checkbox"
                    name="marcas"
                    th:value="${marca.id}"
                    form="formFiltros"
                    th:id="'marca' + ${marca.id}"
                    th:checked="${marcasSeleccionadas != null and #lists.contains(marcasSeleccionadas, marca.id)}"
                  />
                  <label
                    class="form-check-label"
                    th:for="'marca' + ${marca.id}"
                    th:text="${marca.nombre}"
                  ></label>
                </div>
              </div>

              <button
                th:if="${listaMarcas.size() > 5}"
                class="btn btn-link btn-sm text-dark text-decoration-none p-0 mt-2 fw-bold"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseMarcas"
                aria-expanded="false"
                aria-controls="collapseMarcas"
                onclick="
                  this.innerText =
                    this.getAttribute('aria-expanded') === 'true'
                      ? 'Ver menos marcas -'
                      : 'Ver más marcas +'
                "
              >
                Ver más marcas +
              </button>

              <button
                type="submit"
                form="formFiltros"
                class="btn btn-dark w-100 mt-4"
              >
                Aplicar Filtros
              </button>
            </div>
          </div>
        </aside>

        <section class="col-md-9">
          <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" th:each="producto : ${productosPage.content}">
              <div class="card h-100 border-0 shadow-sm overflow-hidden">
                <a
                  th:href="@{/producto/{id}(id=${producto.id})}"
                  class="d-block position-relative bg-light"
                  style="aspect-ratio: 1/1"
                >

                  <img
                    th:src="${producto.imagenUrl2 != null ? producto.imagenUrl2 : (producto.imagenUrl != null ? producto.imagenUrl : '/assets/img/Yeezy.jpg')}"
                    class="position-absolute top-0 start-0 w-100 h-100"
                    style="object-fit: cover"
                    alt="Producto Hover"
                  />

                  <img
                    th:src="${producto.imagenUrl != null ? producto.imagenUrl : '/assets/img/Yeezy.jpg'}"
                    class="position-relative w-100 h-100 card-img-top"
                    style="
                      object-fit: cover;
                      transition: opacity 0.5s ease-in-out;
                    "
                    onmouseover="this.style.opacity = '0'"
                    onmouseout="this.style.opacity = '1'"
                    alt="Producto"
                  />
                </a>

                <div
                  class="card-body text-center"
                  style="cursor: pointer"
                  th:onclick="|window.location.href='@{/producto/}' + ${producto.id}|"
                >
                  <p
                    class="text-muted small mb-1"
                    th:text="${producto.marca.nombre}"
                  >
                    Marca
                  </p>
                  <h6 class="card-title fw-bold" th:text="${producto.nombre}">
                    Nombre Producto
                  </h6>
                  <p
                    class="card-text fw-bold fs-5"
                    th:text="${'S/. ' + producto.precio}"
                  >
                    S/. 0.00
                  </p>
                </div>

                <div class="card-footer bg-white border-0 text-center pb-3">
                  <div sec:authorize="!hasRole('ADMIN')">
                    <a
                      th:href="@{/producto/{id}(id=${producto.id})}"
                      class="btn btn-outline-dark w-100 mb-2"
                      >Ver Detalles</a
                    >
                    <form th:action="@{/carrito/agregar}" method="post">
                      <input
                        type="hidden"
                        name="productoId"
                        th:value="${producto.id}"
                      />
                      <input type="hidden" name="cantidad" value="1" />
                      <button type="submit" class="btn btn-dark w-100">
                        Al carrito <i class="bi bi-cart-plus"></i>
                      </button>
                    </form>
                  </div>

                  <div sec:authorize="hasRole('ADMIN')">
                    <a
                      th:href="@{/producto/{id}(id=${producto.id})}"
                      class="btn btn-outline-secondary w-100 mb-2"
                      >Inspeccionar Detalles</a
                    >
                    <div
                      class="text-center text-muted mt-2 border rounded py-1 bg-light"
                    >
                      <small
                        ><i class="bi bi-shield-lock-fill me-1"></i>Compras
                        deshabilitadas</small
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12" th:if="${productosPage.isEmpty()}">
              <div
                class="alert alert-light text-center py-5 shadow-sm border-0"
                role="alert"
              >
                <i
                  class="bi bi-search"
                  style="font-size: 3rem; color: #ccc"
                ></i>
                <h4 class="fw-bold mt-3">No hay coincidencias</h4>
                <p class="text-muted mb-0">
                  Intenta quitar algunos filtros para ver más productos.
                </p>
                <a th:href="@{/catalogo}" class="btn btn-outline-dark mt-3"
                  >Limpiar Filtros</a
                >
              </div>
            </div>
          </div>

          <nav th:if="${productosPage.totalPages > 1}" class="mt-5">
            <ul class="pagination justify-content-center">
              <li
                class="page-item"
                th:classappend="${productosPage.first ? 'disabled' : ''}"
              >
                <a
                  class="page-link text-dark"
                  th:href="@{/catalogo(page=${productosPage.number - 1}, categorias=${categoriasSeleccionadas}, marcas=${marcasSeleccionadas}, sort=${sortSeleccionado})}"
                  >Anterior</a
                >
              </li>

              <li
                class="page-item"
                th:each="i : ${#numbers.sequence(0, productosPage.totalPages - 1)}"
                th:classappend="${i == productosPage.number ? 'active' : ''}"
              >
                <a
                  class="page-link"
                  th:classappend="${i == productosPage.number ? 'bg-dark border-dark text-white' : 'text-dark'}"
                  th:href="@{/catalogo(page=${i}, categorias=${categoriasSeleccionadas}, marcas=${marcasSeleccionadas}, sort=${sortSeleccionado})}"
                  th:text="${i + 1}"
                  >1</a
                >
              </li>

              <li
                class="page-item"
                th:classappend="${productosPage.last ? 'disabled' : ''}"
              >
                <a
                  class="page-link text-dark"
                  th:href="@{/catalogo(page=${productosPage.number + 1}, categorias=${categoriasSeleccionadas}, marcas=${marcasSeleccionadas}, sort=${sortSeleccionado})}"
                  >Siguiente</a
                >
              </li>
            </ul>
          </nav>
        </section>
      </div>
    </main>
    <div th:replace="~{fragments/footer :: footer-modales}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/assets/js/app.js}"></script>
  </body>
</html>
