<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Directorio de Clientes | FAHAR Streetwear</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/assets/css/estilos.css}" />
    <style>
      body {
        overflow-x: hidden;
      }
      .sidebar {
        min-height: 100vh;
        background-color: #212529;
        box-shadow: inset -1px 0 0 rgba(0, 0, 0, 0.1);
      }
      .sidebar .nav-link {
        color: rgba(255, 255, 255, 0.75);
        font-weight: 500;
      }
      .sidebar .nav-link:hover,
      .sidebar .nav-link.active {
        color: #fff;
        background-color: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>

  <body class="bg-light">
    <div class="container-fluid">
      <div class="row">
        <div
          th:replace="~{fragments/admin-sidebar :: admin-sidebar(activeTab='clientes')}"
        ></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-5">
          <div
            class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom"
          >
            <h1 class="h2 fw-bold">Directorio de Clientes</h1>
          </div>

          <div class="card border-0 shadow-sm p-4">
            <h5 class="fw-bold mb-4">Usuarios Registrados</h5>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Nombre y Apellido</th>
                    <th>Correo Electrónico</th>
                    <th>Teléfono</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    th:each="cliente : ${clientes}"
                    th:if="${cliente.rolId != 1}"
                  >
                    <td
                      class="text-secondary fw-bold"
                      th:text="${'#US-' + cliente.id}"
                    ></td>
                    <td
                      class="fw-bold"
                      th:text="${cliente.nombre + ' ' + cliente.apellidos}"
                    ></td>
                    <td th:text="${cliente.correo}"></td>
                    <td
                      th:text="${cliente.telefono != null ? cliente.telefono : 'No registrado'}"
                    ></td>
                    <td><span class="badge bg-primary">CLIENTE</span></td>
                    <td>
                      <button
                        class="btn btn-sm btn-outline-danger"
                        title="Bloquear Usuario"
                      >
                        <i class="bi bi-slash-circle"></i>
                      </button>
                    </td>
                  </tr>

                  <!-- ESTADO VACÍO -->
                  <tr th:if="${clientes == null or #lists.isEmpty(clientes)}">
                    <td colspan="6" class="text-center py-4 text-muted">
                      No hay clientes registrados en el sistema.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
