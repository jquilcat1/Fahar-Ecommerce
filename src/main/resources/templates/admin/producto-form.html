<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de Prenda | FAHAR Streetwear</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <style>
      body {
        overflow-x: hidden;
      }
      .sidebar {
        min-height: 100vh;
        background-color: #212529;
        box-shadow: inset -1px 0 0 rgba(0, 0, 0, 0.1);
      }
      .sidebar .nav-link {
        color: rgba(255, 255, 255, 0.75);
        font-weight: 500;
      }
      .sidebar .nav-link:hover,
      .sidebar .nav-link.active {
        color: #fff;
        background-color: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>

  <body class="bg-light">
    <div class="container-fluid">
      <div class="row">
        <!-- MENÚ LATERAL (SIDEBAR) -->
        <nav class="col-md-3 col-lg-2 d-md-block sidebar py-4 position-fixed">
          <div class="position-sticky">
            <div class="text-center mb-4">
              <a
                th:href="@{/}"
                class="text-white text-decoration-none fw-bold fs-3"
                >FAHAR.</a
              >
              <p class="text-secondary small mt-1">Panel de Control</p>
            </div>
            <hr class="text-secondary" />
            <ul class="nav flex-column mb-auto">
              <li class="nav-item mb-2">
                <a
                  th:href="@{/admin/productos}"
                  class="nav-link active rounded"
                >
                  <i class="bi bi-box-seam me-2"></i> Inventario
                </a>
              </li>
              <li class="nav-item mb-2">
                <a th:href="@{/admin/ventas}" class="nav-link rounded"
                  ><i class="bi bi-cart me-2"></i> Ventas / Órdenes</a
                >
              </li>
              <li class="nav-item mb-2">
                <a th:href="@{/admin/clientes}" class="nav-link rounded"
                  ><i class="bi bi-people me-2"></i> Clientes</a
                >
              </li>
              <li class="nav-item mb-2">
                <a th:href="@{/admin/mensajes}" class="nav-link rounded"
                  ><i class="bi bi-envelope-paper me-2"></i> Mensajes</a
                >
              </li>
            </ul>
            <hr class="text-secondary mt-5" />
            <div class="px-3 mb-2">
              <a th:href="@{/}" class="btn btn-outline-light w-100"
                ><i class="bi bi-shop me-2"></i> Ir a la Tienda</a
              >
            </div>
            <div class="px-3">
              <form th:action="@{/logout}" method="post" class="m-0 p-0">
                <button type="submit" class="btn btn-danger w-100">
                  <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
                </button>
              </form>
            </div>
          </div>
        </nav>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-5">
          <div
            class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom"
          >
            <h1
              class="h2 fw-bold"
              th:text="${productoDTO.id == null ? 'Registrar Nueva Prenda' : 'Editar Prenda'}"
            >
              Formulario
            </h1>
            <a
              th:href="@{/admin/productos}"
              class="btn btn-outline-dark shadow-sm"
            >
              <i class="bi bi-arrow-left me-2"></i> Volver al Inventario
            </a>
          </div>

          <div
            class="card border-0 shadow-sm p-4 mx-auto"
            style="max-width: 900px"
          >
            <!-- EL ATRIBUTO ENCTYPE ES OBLIGATORIO PARA SUBIR ARCHIVOS -->
            <form
              th:action="@{/admin/productos/guardar}"
              th:object="${productoDTO}"
              method="post"
              enctype="multipart/form-data"
            >
              <input type="hidden" th:field="*{id}" />

              <!-- SECCIÓN 1: DATOS GENERALES -->
              <h5 class="fw-bold mb-3 border-bottom pb-2">Datos Generales</h5>
              <div class="row g-3 mb-4">
                <div class="col-md-12">
                  <label class="form-label fw-bold">Nombre de la Prenda</label>
                  <input
                    type="text"
                    class="form-control"
                    th:field="*{nombre}"
                    th:errorclass="is-invalid"
                    placeholder="Ej: Vale Forever Rainstorm Jorts"
                  />
                  <div
                    class="invalid-feedback fw-bold"
                    th:if="${#fields.hasErrors('nombre')}"
                    th:errors="*{nombre}"
                  ></div>
                </div>

                <div class="col-md-12">
                  <label class="form-label fw-bold"
                    >Descripción / Detalles</label
                  >
                  <textarea
                    class="form-control"
                    rows="3"
                    th:field="*{descripcion}"
                    th:errorclass="is-invalid"
                    placeholder="Describe los materiales, el fit, la historia de la prenda..."
                  ></textarea>
                  <div
                    class="invalid-feedback fw-bold"
                    th:if="${#fields.hasErrors('descripcion')}"
                    th:errors="*{descripcion}"
                  ></div>
                </div>
              </div>

              <!-- SECCIÓN 2: PRECIO, STOCK Y CLASIFICACIÓN -->
              <div class="row g-3 mb-5">
                <div class="col-md-3">
                  <label class="form-label fw-bold">Precio (S/)</label>
                  <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    th:field="*{precio}"
                    th:errorclass="is-invalid"
                  />
                  <div
                    class="invalid-feedback fw-bold"
                    th:if="${#fields.hasErrors('precio')}"
                    th:errors="*{precio}"
                  ></div>
                </div>

                <div class="col-md-3">
                  <label class="form-label fw-bold">Stock Inicial</label>
                  <input
                    type="number"
                    class="form-control"
                    th:field="*{stock}"
                    th:errorclass="is-invalid"
                  />
                  <div
                    class="invalid-feedback fw-bold"
                    th:if="${#fields.hasErrors('stock')}"
                    th:errors="*{stock}"
                  ></div>
                </div>

                <div class="col-md-3">
                  <label class="form-label fw-bold">Categoría</label>
                  <select
                    class="form-select"
                    th:field="*{categoriaId}"
                    th:errorclass="is-invalid"
                  >
                    <option value="" disabled>Seleccione...</option>
                    <option
                      th:each="cat : ${categorias}"
                      th:value="${cat.id}"
                      th:text="${cat.nombre}"
                    ></option>
                  </select>
                  <div
                    class="invalid-feedback fw-bold"
                    th:if="${#fields.hasErrors('categoriaId')}"
                    th:errors="*{categoriaId}"
                  ></div>
                </div>

                <div class="col-md-3">
                  <label class="form-label fw-bold">Marca</label>
                  <select
                    class="form-select"
                    th:field="*{marcaId}"
                    th:errorclass="is-invalid"
                  >
                    <option value="" disabled>Seleccione...</option>
                    <option
                      th:each="marca : ${marcas}"
                      th:value="${marca.id}"
                      th:text="${marca.nombre}"
                    ></option>
                  </select>
                  <div
                    class="invalid-feedback fw-bold"
                    th:if="${#fields.hasErrors('marcaId')}"
                    th:errors="*{marcaId}"
                  ></div>
                </div>
              </div>

              <!-- SECCIÓN 3: GALERÍA DE IMÁGENES FÍSICAS -->
              <h5 class="fw-bold mb-3 border-bottom pb-2">
                Galería de Imágenes
              </h5>
              <p class="text-muted small mb-3">
                Formatos permitidos: .webp, .jpg, .png. <br />
              </p>

              <div class="row g-3 mb-4 bg-light p-3 rounded border">
                <div class="col-md-6">
                  <label class="form-label fw-bold text-dark"
                    >Foto 1 <span class="text-danger">*</span></label
                  >
                  <input
                    type="file"
                    class="form-control"
                    th:field="*{archivo1}"
                    accept=".jpg, .jpeg, .png, .webp"
                    required
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold text-dark"
                    >Foto 2 <span class="text-danger">*</span></label
                  >
                  <input
                    type="file"
                    class="form-control"
                    th:field="*{archivo2}"
                    accept=".jpg, .jpeg, .png, .webp"
                    required
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold text-dark">Foto 3</label>
                  <input
                    type="file"
                    class="form-control"
                    th:field="*{archivo3}"
                    accept=".jpg, .jpeg, .png, .webp"
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold text-dark">Foto 4</label>
                  <input
                    type="file"
                    class="form-control"
                    th:field="*{archivo4}"
                    accept=".jpg, .jpeg, .png, .webp"
                  />
                </div>
              </div>

              <!-- BOTÓN DE GUARDAR -->
              <div class="d-flex justify-content-end gap-3 mt-4">
                <button type="reset" class="btn btn-outline-secondary px-4">
                  Limpiar Campos
                </button>

                <button type="submit" class="btn btn-dark px-4">
                  <i class="bi bi-save me-2"></i>Guardar Producto
                </button>
              </div>
            </form>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
