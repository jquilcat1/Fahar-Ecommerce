<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Inventario | Panel Administrador</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/assets/css/estilos.css}" />
    <style>
      body {
        overflow-x: hidden;
      }
      .sidebar {
        min-height: 100vh;
        background-color: #212529;
        box-shadow: inset -1px 0 0 rgba(0, 0, 0, 0.1);
      }
      .sidebar .nav-link {
        color: rgba(255, 255, 255, 0.75);
        font-weight: 500;
      }
      .sidebar .nav-link:hover,
      .sidebar .nav-link.active {
        color: #fff;
        background-color: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>

  <body class="bg-light">
    <div class="container-fluid">
      <div class="row">
        <div
          th:replace="~{fragments/admin-sidebar :: admin-sidebar(activeTab='productos')}"
        ></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-5">
          <div
            class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom"
          >
            <h1 class="h2 fw-bold">Gestión de Inventario</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
              <a
                th:href="@{/admin/productos/nuevo}"
                class="btn btn-dark shadow-sm"
              >
                <i class="bi bi-plus-circle me-2"></i> Registrar Nuevo Producto
              </a>
            </div>
          </div>

          <div class="row g-4 mb-4">
            <div class="col-md-4">
              <div
                class="card border-0 shadow-sm p-3 border-start border-4 border-dark"
              >
                <h6 class="text-muted fw-bold mb-1">Total Productos</h6>
                <h3
                  class="fw-bold mb-0"
                  th:text="${productos != null ? #lists.size(productos) : 0}"
                >
                  0
                </h3>
              </div>
            </div>
            <div class="col-md-4">
              <div
                class="card border-0 shadow-sm p-3 border-start border-4 border-warning"
              >
                <h6 class="text-muted fw-bold mb-1">Estado del Almacén</h6>
                <h3 class="fw-bold mb-0 fs-5 text-success">Activo</h3>
              </div>
            </div>
            <div class="col-md-4">
              <div
                class="card border-0 shadow-sm p-3 border-start border-4 border-success"
              >
                <h6 class="text-muted fw-bold mb-1">Última Actualización</h6>
                <h3 class="fw-bold mb-0 fs-5 text-dark">Hoy</h3>
              </div>
            </div>
          </div>

          <div class="card border-0 shadow-sm p-4">
            <h5 class="fw-bold mb-4">Catálogo Actual</h5>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>ID</th>
                    <th>Marca ID</th>
                    <th>Producto</th>
                    <th>Cat ID</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="producto : ${productos}">
                    <td
                      class="fw-bold text-secondary"
                      th:text="${'#' + producto.id}"
                    ></td>
                    <td th:text="${producto.nombreMarca}"></td>
                    <td class="fw-bold" th:text="${producto.nombre}"></td>
                    <td th:text="${producto.nombreCategoria}"></td>
                    <td th:text="${'S/. ' + producto.precio}"></td>
                    <td>
                      <span
                        class="badge"
                        th:classappend="${producto.stock < 5 ? 'bg-warning text-dark' : 'bg-success'}"
                        th:text="${producto.stock}"
                      ></span>
                    </td>
                    <td>
                      <a
                        th:href="@{/admin/productos/editar/{id}(id=${producto.id})}"
                        class="btn btn-sm btn-outline-secondary me-1"
                      >
                        <i class="bi bi-pencil"></i>
                      </a>
                      <a
                        th:href="@{/admin/productos/eliminar/{id}(id=${producto.id})}"
                        class="btn btn-sm btn-outline-danger"
                        onclick="return confirm('¿Eliminar producto?');"
                      >
                        <i class="bi bi-trash"></i>
                      </a>
                    </td>
                  </tr>

                  <tr th:if="${productos == null or #lists.isEmpty(productos)}">
                    <td colspan="7" class="text-center py-4 text-muted">
                      Aún no hay productos registrados en el sistema. Usa el
                      botón "Registrar Nuevo Producto" para comenzar.
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
