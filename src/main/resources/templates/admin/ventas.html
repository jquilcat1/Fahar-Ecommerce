<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ventas y Órdenes | FAHAR Streetwear</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
  <link rel="stylesheet" th:href="@{/assets/css/estilos.css}" />
  <style>
    body {
      overflow-x: hidden;
    }

    .sidebar {
      min-height: 100vh;
      background-color: #212529;
      box-shadow: inset -1px 0 0 rgba(0, 0, 0, 0.1);
    }

    .sidebar .nav-link {
      color: rgba(255, 255, 255, 0.75);
      font-weight: 500;
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      color: #fff;
      background-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body class="bg-light">
  <div class="container-fluid">
    <div class="row">
      <div th:replace="~{fragments/admin-sidebar :: admin-sidebar(activeTab='ventas')}"></div>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-5">
        <div
          class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
          <h1 class="h2 fw-bold">Gestión de Ventas y Órdenes</h1>
        </div>

        <div class="card border-0 shadow-sm p-4">
          <h5 class="fw-bold mb-4">Historial de Transacciones</h5>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>ID Pedido</th>
                  <th>Fecha</th>
                  <th>Cliente</th>
                  <th>Total (S/)</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="venta : ${ventas}">
                  <td class="fw-bold text-secondary" th:text="${'#ORD-' + venta.id}"></td>
                  <!-- Variable corregida a fechaPedido -->
                  <td th:text="${#temporals.format(venta.fechaPedido, 'dd/MM/yyyy')}"></td>
                  <!-- Variables corregidas para traer nombre y apellidos del usuario -->
                  <td th:text="${venta.usuario.nombre + ' ' + venta.usuario.apellidos}"></td>
                  <td class="fw-bold" th:text="${'S/. ' + venta.total}"></td>
                  <td>
                    <span class="badge"
                      th:classappend="${venta.estado == 'COMPLETADO' or venta.estado == 'PAGADO' ? 'bg-success' : (venta.estado == 'PENDIENTE' ? 'bg-warning text-dark' : 'bg-secondary')}"
                      th:text="${venta.estado}"></span>
                  </td>
                  <td>
                    <!-- Botón que activa el Modal del Admin -->
                    <button type="button" class="btn btn-sm btn-dark" data-bs-toggle="modal"
                      th:data-bs-target="'#modalAdminDetalle-' + ${venta.id}">
                      Ver Detalles
                    </button>

                    <!-- Modal de Detalle (Admin) -->
                    <div class="modal fade text-start" th:id="'modalAdminDetalle-' + ${venta.id}" tabindex="-1"
                      aria-hidden="true">
                      <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 shadow">
                          <div class="modal-header bg-dark text-white">
                            <h5 class="modal-title fw-bold">Detalle de la Orden #ORD-<span th:text="${venta.id}"></span>
                            </h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                              aria-label="Close"></button>
                          </div>
                          <div class="modal-body">
                            <div class="mb-3">
                              <small class="text-muted fw-bold text-uppercase d-block mb-1">Datos del Cliente</small>
                              <span class="d-block"
                                th:text="${venta.usuario.nombre + ' ' + venta.usuario.apellidos}"></span>
                              <span class="d-block text-muted small" th:text="${venta.usuario.correo}"></span>
                              <span class="d-block text-muted small"
                                th:text="${'Tel: ' + venta.usuario.telefono}"></span>
                            </div>
                            <hr>
                            <small class="text-muted fw-bold text-uppercase d-block mb-2">Productos Comprados</small>
                            <ul class="list-group list-group-flush mb-3">
                              <li class="list-group-item d-flex justify-content-between align-items-center px-0"
                                th:each="detalle : ${venta.detalles}">
                                <div class="d-flex align-items-center">
                                  <img
                                    th:src="${detalle.producto.imagenUrl != null ? detalle.producto.imagenUrl : '/assets/img/Yeezy.jpg'}"
                                    alt="Producto" style="width: 50px; height: 50px; object-fit: cover;"
                                    class="rounded me-3">
                                  <div>
                                    <h6 class="my-0 fw-bold" th:text="${detalle.producto.nombre}">Nombre de la Prenda
                                    </h6>
                                    <small class="text-muted">Cant: <span th:text="${detalle.cantidad}"></span></small>
                                  </div>
                                </div>
                                <span class="text-muted fw-bold" th:text="'S/ ' + ${detalle.subtotal}"></span>
                              </li>
                            </ul>
                            <div class="d-flex justify-content-between fw-bold fs-5 pt-3 border-top">
                              <span>Total ingresado:</span>
                              <span th:text="'S/ ' + ${venta.total}"></span>
                            </div>
                          </div>
                          <div class="modal-footer bg-light">
                            <button type="button" class="btn btn-dark w-100" data-bs-dismiss="modal">Cerrar</button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </td>
                </tr>

                <tr th:if="${ventas == null or #lists.isEmpty(ventas)}">
                  <td colspan="6" class="text-center py-4 text-muted">
                    No hay transacciones ni órdenes registradas en el sistema.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
