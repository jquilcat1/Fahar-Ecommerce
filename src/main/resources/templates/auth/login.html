<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión | FAHAR Streetwear</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/assets/css/estilos.css}" />
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: navbar-carrito}"></div>

    <main
      class="container my-5 flex-grow-1 d-flex justify-content-center align-items-center"
    >
      <div
        class="card p-5 shadow-sm border-0"
        style="max-width: 450px; width: 100%"
      >
        <div class="text-center mb-4">
          <h3 class="fw-bold">Bienvenido de vuelta</h3>
          <p class="text-muted">Ingresa a tu cuenta de FAHAR</p>
        </div>

        <form th:action="@{/login}" method="post">
          <div
            th:if="${param.error != null}"
            class="alert alert-danger text-center shadow-sm p-3 mb-4 border-0"
            role="alert"
          >
            <i class="bi bi-shield-x me-2 fs-5"></i>
            <span class="fw-bold">Credenciales incorrectas.</span><br />
            <small
              >Verifica tu correo y contraseña, o tu cuenta podría ser bloqueada
              tras múltiples intentos.</small
            >
          </div>

          <div
            th:if="${param.logout != null}"
            class="alert alert-success text-center shadow-sm p-3 mb-4 border-0"
            role="alert"
          >
            <i class="bi bi-check-circle me-2"></i> Has cerrado sesión
            correctamente.
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Correo Electrónico</label>
            <input
              type="email"
              name="correo"
              class="form-control form-control-lg"
              placeholder="ejemplo@correo.com"
              required
              autofocus
            />
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold d-flex justify-content-between">
              Contraseña
              <a href="#" class="text-dark small text-decoration-none"
                >¿Olvidaste tu contraseña?</a
              >
            </label>
            <div class="position-relative">
              <input
                type="password"
                name="password"
                id="loginPassword"
                class="form-control form-control-lg"
                placeholder="********"
                style="padding-right: 45px"
                required
              />
              <i
                class="bi bi-eye text-muted position-absolute top-50 end-0 translate-middle-y me-3 fs-5"
                id="toggleLoginPassword"
                style="cursor: pointer; z-index: 10"
              ></i>
            </div>
          </div>

          <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold">
            Iniciar Sesión
          </button>

          <div class="text-center mt-4">
            <p class="small">
              ¿No tienes una cuenta?
              <a th:href="@{/registro}" class="text-dark fw-bold"
                >Regístrate aquí</a
              >
            </p>
          </div>
        </form>
      </div>
    </main>

    <div th:replace="~{fragments/footer :: footer-modales}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/assets/js/app.js}"></script>
  </body>
</html>
