<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finalizar Compra | FAHAR Streetwear</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/assets/css/estilos.css}" />
    <style>
      .input-minimalist:focus {
        box-shadow: none;
        border-color: #000 !important;
      }
      .nav-tabs .nav-link {
        color: #6c757d;
        border: none;
        border-bottom: 2px solid transparent;
      }
      .nav-tabs .nav-link.active {
        color: #000;
        font-weight: bold;
        border-bottom: 2px solid #000;
        background: transparent;
      }
      .nav-tabs .nav-link:hover {
        border-bottom: 2px solid #ccc;
      }
    </style>
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: navbar-carrito}"></div>

    <main class="container my-5 flex-grow-1">
      <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <div class="row g-5">
        <div class="col-lg-8">
          <form
            id="checkoutForm"
            class="needs-validation"
            th:action="@{/carrito/procesar}"
            method="post"
            novalidate
          >
            <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 mb-4">
              <h4 class="mb-4 fw-bold">Método de entrega</h4>

              <ul class="nav nav-tabs mb-4" id="deliveryTab" role="tablist">
                <li class="nav-item" role="presentation">
                  <button
                    class="nav-link active px-4"
                    id="domicilio-tab"
                    data-bs-toggle="tab"
                    data-bs-target="#domicilio"
                    type="button"
                    role="tab"
                  >
                    <i class="bi bi-house-door me-2"></i>A Domicilio
                  </button>
                </li>
                <li class="nav-item" role="presentation">
                  <button
                    class="nav-link px-4"
                    id="tienda-tab"
                    data-bs-toggle="tab"
                    data-bs-target="#tienda"
                    type="button"
                    role="tab"
                  >
                    <i class="bi bi-shop me-2"></i>Recoger en Tienda
                  </button>
                </li>
              </ul>

              <div class="tab-content" id="deliveryTabContent">
                <div class="tab-pane fade show active" id="domicilio" role="tabpanel">
                  <div class="row g-4 mt-1">
                    <div class="col-md-6">
                      <label class="form-label text-muted small fw-bold mb-0">Nombre de quien recibe <span class="text-danger">*</span></label>
                      <input type="text" class="form-control form-control-lg border-0 border-bottom rounded-0 px-0 bg-transparent input-minimalist" name="nombreRecibe" required />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label text-muted small fw-bold mb-0">DNI <span class="text-danger">*</span></label>
                      <input type="text" class="form-control form-control-lg border-0 border-bottom rounded-0 px-0 bg-transparent input-minimalist" name="dni" required pattern="[0-9]{8}" />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label text-muted small fw-bold mb-0">Teléfono <span class="text-danger">*</span></label>
                      <input type="tel" class="form-control form-control-lg border-0 border-bottom rounded-0 px-0 bg-transparent input-minimalist" name="telefono" required pattern="9[0-9]{8}" />
                    </div>
                    <div class="col-md-12">
                      <label class="form-label text-muted small fw-bold mb-0">Dirección <span class="text-danger">*</span></label>
                      <input type="text" class="form-control form-control-lg border-0 border-bottom rounded-0 px-0 bg-transparent input-minimalist" name="direccion" required />
                    </div>
                  </div>
                </div>
                <div class="tab-pane fade" id="tienda" role="tabpanel">
                  <div class="alert alert-light border p-4 text-center text-muted mt-3">
                    <i class="bi bi-geo-alt-fill fs-3 d-block mb-2 text-dark"></i>
                    Recoge en: <strong>Av. Aviación 2340, San Borja, Lima.</strong>
                  </div>
                </div>
              </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
              <h4 class="mb-4 fw-bold">Método de pago</h4>
              <div class="border rounded-3 p-3 mb-3">
                <div class="form-check">
                  <input name="metodoPago" type="radio" class="form-check-input" id="credit" value="TARJETA" checked required />
                  <label class="form-check-label fw-bold" for="credit">Tarjeta / Yape / Plin (Mercado Pago)</label>
                </div>
              </div>
              <div class="border rounded-3 p-3">
                <div class="form-check">
                  <input name="metodoPago" type="radio" class="form-check-input" id="transfer" value="TRANSFERENCIA" required />
                  <label class="form-check-label fw-bold" for="transfer">Transferencia Bancaria Directa</label>
                </div>
              </div>
            </div>
          </form>
        </div>

        <div class="col-lg-4">
          <div class="card border-0 rounded-4 shadow-sm p-4 sticky-top" style="top: 100px;">
            <h5 class="fw-bold mb-4">Resumen del pedido</h5>
            <div class="mb-4">
              <div th:each="item : ${session.carrito}" class="d-flex justify-content-between mb-3 small">
                <span class="text-muted text-truncate me-3" style="max-width: 200px" th:text="${item.cantidad + 'x ' + item.nombre}"></span>
                <span class="fw-bold" th:text="${'S/ ' + (item.precio * item.cantidad)}"></span>
              </div>
            </div>
            <hr class="text-muted opacity-25 mb-4" />
            <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
              <span class="fw-bold">Total a Pagar</span>
              <span class="fs-4 fw-bold" th:text="${session.totalCarrito != null ? 'S/ ' + session.totalCarrito : 'S/ 0.00'}"></span>
            </div>
            <button type="submit" form="checkoutForm" class="btn btn-dark btn-lg w-100 fw-bold rounded-3" th:disabled="${session.carrito == null or #lists.isEmpty(session.carrito)}">
              Confirmar Compra
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/assets/js/app.js}"></script>
  </body>
</html>
