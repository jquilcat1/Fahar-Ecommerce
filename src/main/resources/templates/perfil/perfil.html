<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Perfil | FAHAR Streetwear</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/assets/css/estilos.css}" />
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">
    <div th:replace="~{fragments/header :: navbar-carrito}"></div>

    <main class="container my-5 flex-grow-1">
      <div class="row g-4">
        <div class="col-md-3">
          <div class="list-group shadow-sm">
            <a
              th:href="@{/perfil}"
              class="list-group-item list-group-item-action active bg-dark border-dark fw-bold"
            >
              Mis Datos
            </a>
            <a
              th:href="@{/historial}"
              class="list-group-item list-group-item-action"
            >
              Mis Pedidos
            </a>
            <form th:action="@{/logout}" method="post" class="m-0 p-0">
              <button
                type="submit"
                class="list-group-item list-group-item-action text-danger fw-bold w-100 text-start border-0"
              >
                Cerrar Sesión
              </button>
            </form>
          </div>
        </div>

        <div class="col-md-9">
          <div class="card p-5 border-0 shadow-sm">
            <h3 class="fw-bold mb-4">Datos Personales</h3>
            <form th:action="@{/perfil/editar}" method="post" id="formPerfil">
              <div class="row g-4">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Nombre</label>
                  <input
                    type="text"
                    name="nombre"
                    class="form-control form-control-lg bg-light editable-field"
                    th:value="${usuario != null ? usuario.nombre : ''}"
                    readonly
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Apellido</label>
                  <input
                    type="text"
                    name="apellidos"
                    class="form-control form-control-lg bg-light editable-field"
                    th:value="${usuario != null ? usuario.apellidos : ''}"
                    readonly
                    required
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">Correo Electrónico</label>
                  <input
                    type="email"
                    class="form-control form-control-lg bg-secondary bg-opacity-10 text-muted border-0"
                    th:value="${usuario != null ? usuario.correo : ''}"
                    readonly
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">Teléfono</label>
                  <input
                    type="tel"
                    name="telefono"
                    class="form-control form-control-lg bg-light editable-field"
                    th:value="${usuario != null ? usuario.telefono : ''}"
                    readonly
                    required
                  />
                </div>
              </div>

              <div class="mt-4 d-flex gap-2">
                <button
                  type="button"
                  id="btnEditar"
                  class="btn btn-outline-dark fw-bold"
                >
                  Editar Información
                </button>
                <button
                  type="submit"
                  id="btnGuardar"
                  class="btn btn-dark fw-bold d-none"
                >
                  Guardar Cambios
                </button>
                <button
                  type="button"
                  id="btnCancelar"
                  class="btn btn-link text-muted text-decoration-none d-none"
                >
                  Cancelar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <div th:replace="~{fragments/footer :: footer-modales}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/assets/js/app.js}"></script>

    <script>
      const btnEditar = document.getElementById("btnEditar");
      const btnGuardar = document.getElementById("btnGuardar");
      const btnCancelar = document.getElementById("btnCancelar");
      const campos = document.querySelectorAll(".editable-field");

      btnEditar.addEventListener("click", () => {
        campos.forEach((campo) => {
          campo.removeAttribute("readonly");
          campo.classList.remove("bg-light");
        });
        btnEditar.classList.add("d-none");
        btnGuardar.classList.remove("d-none");
      });

      btnCancelar.addEventListener("click", () => {
        window.location.reload();
      });
    </script>
  </body>
</html>
